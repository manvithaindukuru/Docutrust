services:
  # ==========================
  # Backend
  # ==========================
  - type: web
    name: rag-knowledge-backend
    env: python
    region: oregon
    plan: starter

    rootDir: backend
    branch: main

    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT

    envVars:
      - key: GROQ_API_KEY
        sync: false

      - key: FRONTEND_URLS
        value: https://your-frontend.onrender.com

      - key: PYTHONUNBUFFERED
        value: "1"

      - key: TORCH_CPU_ONLY
        value: "1"

    autoDeploy: true


  # ==========================
  # Frontend
  # ==========================
  - type: static
    name: rag-knowledge-frontend
    env: static
    region: oregon
    plan: starter

    rootDir: frontend
    branch: main

    buildCommand: npm install && npm run build
    publishPath: dist

    envVars:
      - key: VITE_API_URL
        value: https://your-backend.onrender.com

    autoDeploy: true