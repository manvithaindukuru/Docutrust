services:
  - type: web_service
    name: rag-knowledge-backend
    env: python
    region: oregon
    plan: starter
    root: backend
    branch: main

    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT

    envVars:
      - key: GROQ_API_KEY
        value: ""
      - key: FRONTEND_URLS
        value: "https://your-frontend.onrender.com"

    autoDeploy: true

  - type: static_site
    name: rag-knowledge-frontend
    region: oregon
    plan: starter
    root: frontend
    branch: main

    buildCommand: npm install && npm run build
    publishPath: dist

    envVars:
      - key: VITE_API_URL
        value: "https://your-backend.onrender.com"
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"

      - key: TORCH_CPU_ONLY
        value: "1"

    autoDeploy: true
    